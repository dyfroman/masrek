name: Security Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  static-analysis:
    name: Static Analysis (SAST + Supply Chain + Secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SAST — semgrep
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      # Secrets — gitleaks
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Supply chain — trivy
      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: results/sast/trivy.json

      - name: Upload static results
        uses: actions/upload-artifact@v4
        with:
          name: static-results
          path: results/

  dynamic-analysis:
    name: Dynamic Analysis (DAST)
    runs-on: ubuntu-latest
    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Juice Shop
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break
            sleep 2
          done

      - name: Run orchestrator (active — localhost is in scope)
        run: bash tools/run-all.sh --target http://localhost:3000

      - name: Upload DAST results
        uses: actions/upload-artifact@v4
        with:
          name: dast-results
          path: results/

  gate:
    name: Security Gate
    needs: [static-analysis, dynamic-analysis]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4

      - name: Evaluate gate
        run: |
          FAIL_ON=$(grep 'fail_gate_on:' SCOPE.md | awk '{print $2}')
          echo "Gate threshold: $FAIL_ON"
          # Stub — the backend parser will implement proper gate evaluation
          echo "::notice::Security gate evaluation will be implemented with the results parser."

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🔒 Masrek Security Report\n\nScan complete. Full results available in workflow artifacts.\n\n_Detailed PR comments will be implemented with the results parser._'
            })
