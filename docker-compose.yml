services:
  juice-shop:
    image: bkimminich/juice-shop
    ports:
      - "3000:3000"
    restart: unless-stopped

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command:
      - zap.sh
      - -daemon
      - -host
      - "0.0.0.0"
      - -port
      - "8080"
      - -config
      - api.key=masrek-zap-dev-key
      - -config
      - api.addrs.addr.name=.*
      - -config
      - api.addrs.addr.regex=true
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  backend:
    build: ./backend
    init: true
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./SCOPE.md:/app/SCOPE.md:ro
      - ./tools:/app/tools:ro
      - masrek-results:/app/results
      - ./source:/app/source:ro
    environment:
      - MASREK_PROJECT_ROOT=/app
      - SCOPE_FILE=/app/SCOPE.md
      - RESULTS_DIR=/app/results
      - MASREK_AUTH_DISABLED=1
      - FRONTEND_ORIGIN=http://localhost:5173
      - ZAP_API_URL=http://zap:8080
      - ZAP_API_KEY=masrek-zap-dev-key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - juice-shop
      - zap

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

volumes:
  masrek-results:
